<!doctype html>
<html lang="is">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1614" />
    <title>Veðurstöð Turbo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=VT323&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="console" class="console">
      <header class="console__header">
        <div class="console__brand">
          <span class="console__brand-line">VEÐURSTÖÐ</span>
          <span class="console__brand-line console__brand-line--big">TURBO</span>
        </div>
        <div class="console__meta">
          <span class="console__meta-label">SÓLARGANGUR</span>
          <span class="console__meta-value" id="sun-times">--:-- / --:--</span>
          <span class="console__meta-label">STÖÐ</span>
          <button type="button" class="console__station-btn" id="station-btn" title="Breyta stöð">
            <span class="console__meta-value" id="station-name">—</span>
            <span class="console__station-gear" aria-hidden="true">⚙</span>
          </button>
          <span class="console__meta-label">KL.</span>
          <span class="console__meta-value" id="clock">--:--:--</span>
        </div>
      </header>
      <main class="console__grid">
        <section class="panel panel--obs" data-panel="obs"></section>
        <section class="panel panel--forecast" data-panel="forecast"></section>
        <section class="panel panel--warnings" data-panel="warnings"></section>
        <section class="panel panel--moon" data-panel="moon"></section>
        <section class="panel panel--placeholder" data-panel="tides"></section>
        <section class="panel panel--placeholder" data-panel="quakes"></section>
        <section class="panel panel--placeholder" data-panel="traffic"></section>
      </main>
      <footer class="console__footer">
        <span class="console__footer-slug" id="footer-station">VEÐURSTOFA&nbsp;ÍSLANDS</span>
        <span class="console__footer-slug" id="build-slug">v0.1</span>
      </footer>
    </div>

    <dialog id="station-dialog" class="station-dialog">
      <form method="dialog" class="station-form" id="station-form">
        <h3 class="station-form__title">STILLA STÖÐ</h3>
        <label class="station-form__row">
          <span>Velja stöð</span>
          <select id="station-select" name="station-select">
            <option value="">— sérsniðið —</option>
          </select>
        </label>
        <label class="station-form__row">
          <span>Stöðvarnúmer</span>
          <input name="id" type="number" min="1" step="1" required />
        </label>
        <label class="station-form__row">
          <span>Nafn</span>
          <input name="name" type="text" required />
        </label>
        <label class="station-form__row">
          <span>Breiddargráða</span>
          <input name="lat" type="number" step="any" min="-90" max="90" required />
        </label>
        <label class="station-form__row">
          <span>Lengdargráða</span>
          <input name="lon" type="number" step="any" min="-180" max="180" required />
        </label>
        <p class="station-form__help">
          Stöðvarnúmer má finna á
          <a href="https://xmlweather.vedur.is/" target="_blank" rel="noopener noreferrer">xmlweather.vedur.is</a>
          (listi yfir sjálfvirkar veðurstöðvar Veðurstofunnar).
        </p>
        <menu class="station-form__buttons">
          <button type="button" value="cancel" id="station-cancel">Hætta við</button>
          <button type="button" value="reset" id="station-reset">Sjálfgefið</button>
          <button type="submit" value="save" id="station-save">Vista</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
